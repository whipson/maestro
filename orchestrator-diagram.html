<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro — Orchestrator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f0eaf8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  svg { display: block; }

  /* ── Orchestrator ─────────────────────────────────────────── */
  .orch-ring {
    fill: none; stroke: #9012C7; stroke-width: 2; opacity: 0;
    transform-box: fill-box; transform-origin: center;
  }
  .orch-ring.fire { animation: ringOut 0.72s ease-out forwards; }
  @keyframes ringOut {
    0%   { opacity: 0.5; transform: scale(1.0); }
    100% { opacity: 0.0; transform: scale(2.1); }
  }

  /* ── Task nodes ───────────────────────────────────────────── */
  .node-box {
    fill: #fff;
    stroke: #ddd0ed;
    stroke-width: 1.5;
    transition: fill 0.32s, stroke 0.32s, filter 0.32s;
  }
  .node-box.active {
    fill: #9012C7;
    stroke: #9012C7;
    filter: drop-shadow(0 3px 14px rgba(144,18,199,0.32));
  }

  .down-box {
    fill: #fff;
    stroke: #ddd0ed;
    stroke-width: 1.5;
    transition: fill 0.32s, stroke 0.32s, filter 0.32s;
  }
  .down-box.active {
    fill: #c060e8;
    stroke: #9012C7;
    filter: drop-shadow(0 3px 10px rgba(144,18,199,0.25));
  }

  /* ── Branch lines ─────────────────────────────────────────── */
  .branch {
    stroke: #e8ddf5;
    stroke-width: 2;
    fill: none;
    marker-end: url(#arr-off);
    transition: stroke 0.32s, filter 0.32s;
  }
  .branch.active {
    stroke: #9012C7;
    marker-end: url(#arr-on);
    filter: drop-shadow(0 0 5px rgba(144,18,199,0.38));
  }

  /* ── Timeline ─────────────────────────────────────────────── */
  .tl-segment { stroke: #e8ddf5; stroke-width: 2; transition: stroke 0.3s; }
  .tl-segment.active { stroke: #9012C7; }
  .tl-node {
    fill: #e4d6f5; stroke: #d4c4ea; stroke-width: 1.5;
    transition: fill 0.25s, stroke 0.25s;
  }
  .tl-node.active { fill: #9012C7; stroke: #9012C7; }
  .tl-label { fill: #c0a8d8; font-size: 9.5px; letter-spacing: 0.05em; transition: fill 0.25s; }
  .tl-label.active { fill: #9012C7; font-weight: 700; }

  /* ── Clock ────────────────────────────────────────────────── */
  .clock-face { fill: none; stroke: rgba(255,255,255,0.48); stroke-width: 1.5; }
  .clock-tick { stroke: rgba(255,255,255,0.55); stroke-width: 1.5; stroke-linecap: round; }
  .clock-hand { stroke: #fff; stroke-width: 2.2; stroke-linecap: round; }
  .clock-dot  { fill: rgba(255,255,255,0.9); }

  /* ── Badges ───────────────────────────────────────────────── */
  .badge-bg {
    fill: #ede5f8;
    transition: fill 0.32s;
  }
  .badge-bg.active { fill: rgba(255,255,255,0.16); }

  .badge-text {
    font-family: 'Courier New', Courier, monospace;
    font-size: 7.8px;
    fill: #8858aa;
    transition: fill 0.32s;
  }
  .badge-text.active { fill: rgba(255,255,255,0.85); }

  /* ── Node name ────────────────────────────────────────────── */
  .node-name {
    font-size: 11px;
    font-weight: 500;
    fill: #7a5c96;
    transition: fill 0.32s;
  }
  .node-name.active { fill: #fff; }

  /* ── Misc ─────────────────────────────────────────────────── */
  .wordmark {
    fill: #c8b2de; font-size: 11px; letter-spacing: 0.22em; font-weight: 500;
  }
  .orch-label {
    fill: #6b24a0; font-size: 9.5px; font-weight: 600; letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<svg width="700" height="410" viewBox="0 0 700 410">
<defs>
  <marker id="arr-off" markerWidth="7" markerHeight="6"
          refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0.5 L7,3 L0,5.5 Z" fill="#e8ddf5"/>
  </marker>
  <marker id="arr-on" markerWidth="7" markerHeight="6"
          refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0.5 L7,3 L0,5.5 Z" fill="#9012C7"/>
  </marker>
  <filter id="card-shadow" x="-10%" y="-15%" width="120%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(100,50,140,0.10)"/>
  </filter>
</defs>

  <!-- Background -->
  <rect width="700" height="410" rx="16" fill="#faf7fd"/>
  <pattern id="pts" x="0" y="0" width="26" height="26" patternUnits="userSpaceOnUse">
    <circle cx="13" cy="13" r="1.1" fill="#f0e8f8"/>
  </pattern>
  <rect width="700" height="410" rx="16" fill="url(#pts)"/>

  <!-- Wordmark -->
  <text class="wordmark" x="350" y="26" text-anchor="middle">MAESTRO</text>

  <!-- ══════════════════════════════════════════════════════
       TIMELINE  (y=56)
  ══════════════════════════════════════════════════════ -->
  <line id="tls0" class="tl-segment" x1="158" y1="56" x2="298" y2="56"/>
  <line id="tls1" class="tl-segment" x1="318" y1="56" x2="452" y2="56"/>
  <line id="tls2" class="tl-segment" x1="472" y1="56" x2="592" y2="56"/>

  <circle id="tn0" class="tl-node" cx="147" cy="56" r="11"/>
  <circle id="tn1" class="tl-node" cx="308" cy="56" r="11"/>
  <circle id="tn2" class="tl-node" cx="462" cy="56" r="11"/>
  <circle id="tn3" class="tl-node" cx="603" cy="56" r="11"/>

  <text id="tl0" class="tl-label" x="147" y="78" text-anchor="middle">:00</text>
  <text id="tl1" class="tl-label" x="308" y="78" text-anchor="middle">:15</text>
  <text id="tl2" class="tl-label" x="462" y="78" text-anchor="middle">:30</text>
  <text id="tl3" class="tl-label" x="603" y="78" text-anchor="middle">:45</text>
  <text class="tl-label" x="222" y="78" text-anchor="middle" opacity="0.7">15m</text>
  <text class="tl-label" x="385" y="78" text-anchor="middle" opacity="0.7">15m</text>
  <text class="tl-label" x="527" y="78" text-anchor="middle" opacity="0.7">15m</text>

  <!-- ══════════════════════════════════════════════════════
       ORCHESTRATOR
       Vertically centred between Task A (cy=154) and Task C (cy=340)
       → cy = (154+340)/2 = 247, rounded to 246 to align with Task B exactly.
       cx=112, cy=246, r=44
  ══════════════════════════════════════════════════════ -->
  <circle id="or1" class="orch-ring" cx="112" cy="246" r="52"/>
  <circle id="or2" class="orch-ring" cx="112" cy="246" r="60"/>
  <circle id="orch-body" cx="112" cy="246" r="44"
          fill="#9012C7"
          style="filter: drop-shadow(0 3px 12px rgba(144,18,199,0.28)); transition: filter 0.2s;"/>

  <!-- Clock face centred at (112, 246), r=20 -->
  <circle class="clock-face" cx="112" cy="246" r="20"/>
  <!-- Tick marks at 12 / 3 / 6 / 9 -->
  <line class="clock-tick" x1="112" y1="228" x2="112" y2="231"/>
  <line class="clock-tick" x1="130" y1="246" x2="127" y2="246"/>
  <line class="clock-tick" x1="112" y1="264" x2="112" y2="261"/>
  <line class="clock-tick" x1="94"  y1="246" x2="97"  y2="246"/>
  <!-- Minute hand — starts at 12 (:00) -->
  <line id="orch-min" class="clock-hand" x1="112" y1="246" x2="112" y2="228"/>
  <circle class="clock-dot" cx="112" cy="246" r="2.5"/>

  <!-- Label — below circle bottom (246+44=290) -->
  <text class="orch-label" x="112" y="304" text-anchor="middle">ORCHESTRATOR</text>

  <!-- ══════════════════════════════════════════════════════
       BRANCH LINES
       Exit points calculated from circle (cx=112, cy=246, r=44).

       bra → Task A left edge (291, 154):
         dir=(179,-92), |d|≈201.3, unit=(0.889,-0.457)
         exit=(112+39.1, 246-20.1) ≈ (151, 226)

       brb → Task B left edge (291, 246): pure horizontal
         exit=(156, 246)

       brc → Task C left edge (291, 340):
         dir=(179,94), |d|≈202.2, unit=(0.885,0.465)
         exit=(112+38.9, 246+20.5) ≈ (151, 267)

       brd → Task D left edge (472, 246): horizontal
  ══════════════════════════════════════════════════════ -->
  <line id="bra" class="branch" x1="151" y1="226" x2="291" y2="158"/>
  <line id="brb" class="branch" x1="156" y1="246" x2="291" y2="246"/>
  <line id="brc" class="branch" x1="151" y1="267" x2="291" y2="334"/>
  <line id="brd" class="branch" x1="414" y1="246" x2="471" y2="246"/>

  <!-- ══════════════════════════════════════════════════════
       TASK A  — every 15m
       rect: x=294, y=118, w=120, h=72  →  center (354, 154)
  ══════════════════════════════════════════════════════ -->
  <rect id="ta" class="node-box" x="294" y="118" width="120" height="72" rx="12"
        filter="url(#card-shadow)"/>
  <rect id="ta-badge" class="badge-bg" x="300" y="124" width="108" height="28" rx="7"/>
  <text id="ta-badge-t" class="badge-text" x="354" y="135" text-anchor="middle">
    <tspan x="354" dy="0">@maestroFrequency</tspan>
    <tspan x="354" dy="12">15 minutes</tspan>
  </text>
  <text id="ta-name" class="node-name" x="354" y="174" text-anchor="middle">temp_readings</text>

  <!-- ══════════════════════════════════════════════════════
       TASK B  — every 30m
       rect: x=294, y=210, w=120, h=72  →  center (354, 246)
  ══════════════════════════════════════════════════════ -->
  <rect id="tb" class="node-box" x="294" y="210" width="120" height="72" rx="12"
        filter="url(#card-shadow)"/>
  <rect id="tb-badge" class="badge-bg" x="300" y="216" width="108" height="28" rx="7"/>
  <text id="tb-badge-t" class="badge-text" x="354" y="227" text-anchor="middle">
    <tspan x="354" dy="0">@maestroFrequency</tspan>
    <tspan x="354" dy="12">30 minutes</tspan>
  </text>
  <text id="tb-name" class="node-name" x="354" y="267" text-anchor="middle">weather_bulletins</text>

  <!-- ══════════════════════════════════════════════════════
       TASK C  — every 60m
       rect: x=294, y=304, w=120, h=72  →  center (354, 340)
  ══════════════════════════════════════════════════════ -->
  <rect id="tc" class="node-box" x="294" y="304" width="120" height="72" rx="12"
        filter="url(#card-shadow)"/>
  <rect id="tc-badge" class="badge-bg" x="300" y="310" width="108" height="28" rx="7"/>
  <text id="tc-badge-t" class="badge-text" x="354" y="321" text-anchor="middle">
    <tspan x="354" dy="0">@maestroFrequency</tspan>
    <tspan x="354" dy="12">1 hour</tspan>
  </text>
  <text id="tc-name" class="node-name" x="354" y="361" text-anchor="middle">satellite_imagery</text>

  <!-- ══════════════════════════════════════════════════════
       TASK D  — downstream from B
       rect: x=472, y=218, w=104, h=56  →  center (524, 246)
  ══════════════════════════════════════════════════════ -->
  <rect id="td" class="down-box" x="472" y="218" width="104" height="56" rx="12"
        filter="url(#card-shadow)"/>
  <rect id="td-badge" class="badge-bg" x="478" y="224" width="92" height="26" rx="7"/>
  <text id="td-badge-t" class="badge-text" x="524" y="234" text-anchor="middle">
    <tspan x="524" dy="0">@maestroInputs</tspan>
    <tspan x="524" dy="12">weather_bulletins</tspan>
  </text>
  <text id="td-name" class="node-name" x="524" y="262" text-anchor="middle">send_alert</text>

</svg>

<script>
// ── Utilities ─────────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));
const $  = id => document.getElementById(id);

function cls(state, name, ...ids) {
  ids.forEach(id => { const el = $(id); if (el) el.classList.toggle(name, state); });
}
function setFill(fill, ...ids) {
  ids.forEach(id => { const el = $(id); if (el) el.setAttribute('fill', fill); });
}

// ── Node activate / deactivate ─────────────────────────────────
const TASK_DEF = { name: '#7a5c96', badge: '#ede5f8', badgeT: '#8858aa' };
const TASK_ACT = { name: '#fff',    badge: 'rgba(255,255,255,0.16)', badgeT: 'rgba(255,255,255,0.85)' };
const DOWN_DEF = { name: '#7a5c96', badge: '#ede5f8', badgeT: '#8858aa' };
const DOWN_ACT = { name: '#fff',    badge: 'rgba(255,255,255,0.16)', badgeT: 'rgba(255,255,255,0.85)' };

function setNode(id, colors) {
  const active = colors === TASK_ACT || colors === DOWN_ACT;
  cls(active, 'active', id, `${id}-badge`, `${id}-badge-t`);
  setFill(colors.name,   `${id}-name`);
  setFill(colors.badge,  `${id}-badge`);
  setFill(colors.badgeT, `${id}-badge-t`);
}

// ── Timeline ───────────────────────────────────────────────────
function setTimeline(tick) {
  for (let i = 0; i < 4; i++) {
    cls(i === tick, 'active', `tn${i}`, `tl${i}`);
    if (i < 3) cls(i < tick, 'active', `tls${i}`);
  }
}

// ── Orchestrator pulse ─────────────────────────────────────────
function pulseOrch() {
  const body = $('orch-body');
  body.style.filter = 'drop-shadow(0 0 22px rgba(144,18,199,0.62))';
  setTimeout(() => { body.style.filter = 'drop-shadow(0 3px 12px rgba(144,18,199,0.28))'; }, 480);
  ['or1','or2'].forEach((id, i) => {
    const el = $(id);
    el.classList.remove('fire');
    void el.offsetWidth;
    setTimeout(() => el.classList.add('fire'), i * 110);
  });
}

// ── Discrete minute hand — 4 positions matching timeline ticks ─
// Clock centre: (112, 246), hand length 18px
const MIN_POS = [
  { x2: 112, y2: 228 }, // :00 → 12 o'clock  (246-18)
  { x2: 130, y2: 246 }, // :15 → 3 o'clock   (112+18)
  { x2: 112, y2: 264 }, // :30 → 6 o'clock   (246+18)
  { x2: 94,  y2: 246 }, // :45 → 9 o'clock   (112-18)
];

function setMinHand(tick) {
  const p = MIN_POS[tick];
  $('orch-min').setAttribute('x2', p.x2);
  $('orch-min').setAttribute('y2', p.y2);
}

// ── Tick schedule ──────────────────────────────────────────────
const FIRES = [
  { a: true,  b: true,  c: true  }, // :00
  { a: true,  b: false, c: false }, // :15
  { a: true,  b: true,  c: false }, // :30
  { a: true,  b: false, c: false }, // :45
];

const STEP   = 310;
const HOLD   = 820;
const GAP    = 280;
const SETTLE = 150;

async function runTick(i) {
  const f = FIRES[i];

  setTimeline(i);
  setMinHand(i);
  pulseOrch();
  await sleep(300);

  if (f.a) cls(true, 'active', 'bra');
  if (f.b) cls(true, 'active', 'brb');
  if (f.c) cls(true, 'active', 'brc');
  await sleep(STEP);

  if (f.a) setNode('ta', TASK_ACT);
  await sleep(80);
  if (f.b) setNode('tb', TASK_ACT);
  await sleep(80);
  if (f.c) setNode('tc', TASK_ACT);

  if (f.b) {
    await sleep(STEP);
    cls(true, 'active', 'brd');
    await sleep(STEP * 0.5);
    setNode('td', DOWN_ACT);
  }

  await sleep(HOLD);

  cls(false, 'active', 'bra', 'brb', 'brc', 'brd');
  setNode('ta', TASK_DEF);
  setNode('tb', TASK_DEF);
  setNode('tc', TASK_DEF);
  setNode('td', DOWN_DEF);

  await sleep(SETTLE);
}

async function loop() {
  for (let i = 0; i < 4; i++) {
    await runTick(i);
    await sleep(GAP);
  }
  await sleep(500);
  loop();
}

setTimeout(loop, 600);
</script>
</body>
</html>
